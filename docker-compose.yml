services:
  postgres:
    image: postgres:16-alpine
    container_name: brain-agriculture-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: brain
      POSTGRES_PASSWORD: brain
      POSTGRES_DB: brain_agriculture
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U brain -d brain_agriculture"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
