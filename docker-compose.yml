services:
  postgres:
    image: postgres:16-alpine
    container_name: brain-agriculture-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: brain
      POSTGRES_PASSWORD: brain
      POSTGRES_DB: brain_agriculture
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U brain -d brain_agriculture"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: brain-agriculture-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://brain:brain@postgres:5432/brain_agriculture?schema=public
      API_PORT: 3333
      WEB_ORIGIN: http://localhost:4173
    ports:
      - "3333:3333"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: http://localhost:3333
    container_name: brain-agriculture-web
    restart: unless-stopped
    ports:
      - "4173:4173"
    depends_on:
      - api

volumes:
  postgres_data:
